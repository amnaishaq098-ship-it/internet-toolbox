<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Internet Toolbox</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Inter;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;

min-height:100vh;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

}

/* HERO */

.hero{

text-align:center;
max-width:800px;
padding:40px;

}

.hero h1{

font-size:48px;
font-weight:600;

background:linear-gradient(90deg,#8b5cf6,#22d3ee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.hero p{

margin-top:20px;
color:#94a3b8;
font-size:18px;

}

/* TOOLS GRID */

.tools{

margin-top:60px;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;

width:90%;
max-width:1000px;

}

/* TOOL CARD */

.tool{

background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);

padding:25px;
border-radius:12px;

text-align:center;

transition:all .3s;

border:1px solid rgba(255,255,255,0.1);

}

.tool:hover{

transform:translateY(-6px) scale(1.02);

background:rgba(255,255,255,0.1);

}

/* LINKS */

a{

color:white;
text-decoration:none;
font-size:18px;

}

/* FOOTER */

.footer{

margin-top:60px;
color:#64748b;
font-size:14px;

}

</style>

</head>

<body>

<div class="hero">

<h1>Internet Toolbox</h1>

<p>Powerful online tools for developers, creators and everyone.</p>

</div>

<div class="tools">

<div class="tool">

<a href="/tools/password.html">Password Generator</a>

</div>

<div class="tool">

<a href="/tools/qr.html">QR Generator</a>

</div>

<div class="tool">

<a href="/tools/json.html">JSON Formatter</a>

</div>

<div class="tool">

<a href="#">Base64 Encoder</a>

</div>

<div class="tool">

<a href="#">UUID Generator</a>

</div>

<div class="tool">

<a href="#">Word Counter</a>

</div>

</div>

<div class="footer">

Built with ❤️ for developers

</div>

</body>

</html>
