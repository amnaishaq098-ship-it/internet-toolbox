<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Internet Toolbox</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Inter;
background:#020617;
color:white;
min-height:100vh;

}

/* NAVBAR */

.navbar{

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 40px;

background:rgba(255,255,255,0.02);
backdrop-filter:blur(10px);

border-bottom:1px solid rgba(255,255,255,0.08);

}

.logo{

font-size:20px;
font-weight:600;

background:linear-gradient(90deg,#8b5cf6,#22d3ee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.navlinks a{

margin-left:20px;
color:#94a3b8;
text-decoration:none;
font-size:14px;

}

.navlinks a:hover{

color:white;

}

/* HERO */

.hero{

text-align:center;
padding:80px 20px;

}

.hero h1{

font-size:48px;

background:linear-gradient(90deg,#8b5cf6,#22d3ee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.hero p{

margin-top:20px;
color:#94a3b8;

}

/* SEARCH BAR */

.search{

margin-top:40px;
display:flex;
justify-content:center;

}

.search input{

width:400px;
max-width:90%;

padding:14px;

border-radius:8px;
border:none;

background:#0f172a;
color:white;

outline:none;

}

/* TOOLS GRID */

.tools{

padding:40px;

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

max-width:1100px;
margin:auto;

}

/* TOOL CARD */

.tool{

background:rgba(255,255,255,0.04);

padding:25px;

border-radius:12px;

text-align:center;

transition:.3s;

border:1px solid rgba(255,255,255,0.05);

}

.tool:hover{

transform:translateY(-6px);

background:rgba(255,255,255,0.08);

}

/* TOOL NAME */

.tool a{

text-decoration:none;
color:white;
font-size:18px;

}

/* FOOTER */

.footer{

text-align:center;

padding:40px;

color:#64748b;

}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
Internet Toolbox
</div>

<div class="navlinks">

<a href="#">Tools</a>
<a href="#">API</a>
<a href="#">Docs</a>
<a href="#">About</a>

</div>

</div>

<!-- HERO -->

<div class="hero">

<h1>All Your Internet Tools</h1>

<p>Fast, free and powerful online tools.</p>

<div class="search">

<input id="search" placeholder="Search tools...">

</div>

</div>

<!-- TOOLS -->

<div class="tools" id="tools">

<div class="tool">
<a href="/tools/password.html">Password Generator</a>
</div>

<div class="tool">
<a href="/tools/qr.html">QR Generator</a>
</div>

<div class="tool">
<a href="/tools/json.html">JSON Formatter</a>
</div>

<div class="tool">
<a href="#">Base64 Encoder</a>
</div>

<div class="tool">
<a href="#">UUID Generator</a>
</div>

<div class="tool">
<a href="#">Word Counter</a>
</div>

</div>

<div class="footer">

© 2026 Internet Toolbox

</div>

<script>

/* TOOL SEARCH */

const search=document.getElementById("search");

search.addEventListener("keyup",function(){

let value=this.value.toLowerCase();

document.querySelectorAll(".tool").forEach(tool=>{

let text=tool.innerText.toLowerCase();

tool.style.display=text.includes(value)?"block":"none";

});

});

</script>

</body>

</html>
